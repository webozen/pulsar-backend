server:
  port: 8080
  tomcat:
    websocket:
      max-text-message-buffer-size: 1048576   # 1MB — handles large JWTs + audio JSON
      max-binary-message-buffer-size: 1048576

spring:
  application:
    name: pulsar-host
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 52MB
  datasource:
    # All three values are env-var-driven. No defaults — Spring fails to
    # start with a clear "Could not resolve placeholder" error if any are
    # missing. Local dev: source pulsar-backend/.env (see .env.example).
    # Container path: docker-compose.yml sets them on the backend service.
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration/platform
    schemas: pulsar_platform
    default-schema: pulsar_platform
    create-schemas: true

pulsar:
  # Set by the nssm service env (bootstrap.sh passes --domain=<name>). Decides
  # which theme under classpath:branding/<domain>/ is served as the domain
  # fallback by BrandingController. Defaults to 'generic' if unset.
  domain: ${PULSAR_DOMAIN:generic}
  admin:
    passcode: ${PULSAR_ADMIN_PASSCODE:PULS-DEV-0000}
  jwt:
    secret: ${PULSAR_JWT_SECRET:dev-secret-change-me-please-32bytes-minimum-abcdefgh}
    ttl-seconds: 3600
  mysql:
    # Per-tenant DB pool credentials — env-var-driven, no defaults. Same
    # rationale as spring.datasource above.
    base-jdbc-url: ${PULSAR_MYSQL_BASE_JDBC_URL}
    user: ${PULSAR_MYSQL_USER}
    password: ${PULSAR_MYSQL_PASSWORD}
  content:
    upload-dir: ${PULSAR_CONTENT_UPLOAD_DIR:./uploads}
  anythingllm:
    url: ${ANYTHINGLLM_URL:http://localhost:3001}
    api-key: ${ANYTHINGLLM_API_KEY:}
  plaud:
    base-url: ${PLAUD_BASE_URL:https://api.plaud.ai}
  translate:
    # Platform defaults — per-tenant overrides live in
    # pulsar_t_<slug>.translate_config and take precedence when non-null.
    session-duration-min: ${PULSAR_TRANSLATE_SESSION_DURATION_MIN:30}
    extend-grant-min: ${PULSAR_TRANSLATE_EXTEND_GRANT_MIN:30}
    max-extends: ${PULSAR_TRANSLATE_MAX_EXTENDS:3}
    history-enabled: ${PULSAR_TRANSLATE_HISTORY_ENABLED:false}
    history-retention-days: ${PULSAR_TRANSLATE_HISTORY_RETENTION_DAYS:90}
    # AES-256-GCM key for conversation transcript at rest. 32-byte base64.
    # Required only when history-enabled=true; empty disables history persistence
    # even if a tenant has it switched on (fail-closed).
    history-key: ${PULSAR_TRANSLATE_HISTORY_KEY:}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
